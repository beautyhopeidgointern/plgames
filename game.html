<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PL Games - Detail</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <section class="hero">
  <span class="badge">PRICE LIST</span>
  <h1 id="game-title">Loading...</h1>
  <p id="game-subtitle" class="hero-text">Sedang memuat data game...</p>
</section>
    </div>
  </header>

  <main class="container main-content">
    <section class="card section-spacing">
      <div class="section-head">
        <div>
          <h2>Daftar Harga</h2>
          <p>Klik nominal untuk lanjut ke form.</p>
        </div>
      </div>

      <div id="price-list" class="price-grid"></div>
    </section>

    <section class="card" id="order-section">
      <div class="section-head">
        <div>
          <h2>Form Pesanan</h2>
          <p>Isi data dengan benar, lalu salin format pesan dan kirim ke admin.</p>
        </div>
      </div>

      <form id="order-form" onsubmit="return false;">
        <div id="dynamic-fields" class="form-grid"></div>

        <div class="form-grid">
          <div class="form-group">
            <label for="selected-product">Produk Dipilih</label>
            <input type="text" id="selected-product" readonly />
          </div>

          <div class="form-group">
            <label for="selected-price">Harga</label>
            <input type="text" id="selected-price" readonly />
          </div>
        </div>

        <div class="form-group">
          <label for="note">Catatan</label>
          <textarea id="note" rows="4" placeholder="Tambahkan catatan bila perlu"></textarea>
        </div>

        <div class="button-row">
          <button type="button" id="copy-btn">Salin Pesanan</button>
          <a href="#" id="contact-btn" class="contact-btn" target="_blank" rel="noopener noreferrer">Hubungi Admin</a>
        </div>

        <div class="form-group">
          <label for="preview-order">Preview Pesanan</label>
          <textarea id="preview-order" rows="10" readonly></textarea>
        </div>

        <div class="back-row">
          <a href="./index.html" class="back-link">← Kembali ke daftar game</a>
        </div>
      </form>
    </section>
  </main>

  <script src="./assets/js/app.js"></script>
</body>
</html>
